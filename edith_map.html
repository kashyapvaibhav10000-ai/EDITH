"], "functions": [{"name": "_detect_location", "doc": "Get user's location. Uses .env override or defaults to Fatehpur, UP."}, {"name": "get_current_weather", "doc": "Get current weather using Open-Meteo (free, no API key needed)."}, {"name": "format_weather", "doc": "Format weather data into a human-readable string."}, {"name": "get_greeting", "doc": "Generate EDITH's full wake-up greeting with time, date, and weather."}]}, {"id": "whatsapp", "name": "whatsapp.py", "layer": "io", "lines": 82, "purpose": "EDITH WhatsApp Module \u2014 Phase 5.1 (Stub)\n\nPlaceholder for WhatsApp bridge integration.\nRequires whatsapp-web.js or simil\u2026", "calls": ["config"], "functions": [{"name": "is_available", "doc": "Check if WhatsApp bridge is configured and reachable."}, {"name": "send_message", "doc": "Send a WhatsApp message (HITL gated)."}, {"name": "get_unread", "doc": "Get unread WhatsApp messages."}, {"name": "draft_message", "doc": "Draft a message without sending (dry-run mode)."}]}];
const COLS={entry:'#7F77DD',brain:'#1D9E75',memory:'#D85A30',io:'#378ADD',infra:'#888780',security:'#D4537E',code:'#BA7517',vision:'#639922'};
const LAYERS=[
  {id:'entry',label:'Entry Points'},{id:'brain',label:'Brain'},{id:'memory',label:'Memory'},
  {id:'io',label:'I/O & Integration'},{id:'infra',label:'Infrastructure'},
  {id:'security',label:'Security'},{id:'code',label:'Code Intelligence'},{id:'vision',label:'Vision'},
];
let aL='all',sT='',selId=null;
function render(){
  const g=document.getElementById('graph');g.innerHTML='';
  LAYERS.forEach(l=>{
    const ms=MODS.filter(m=>{
      const lok=aL==='all'||m.layer===l.id;
      const sok=!sT||m.name.toLowerCase().includes(sT)||m.purpose.toLowerCase().includes(sT);
      return lok&&sok&&m.layer===l.id;
    });
    if(!ms.length)return;
    const d=document.createElement('div');d.className='layer';
    d.innerHTML=`<div class="ltitle">${l.label}</div><div class="nodes" id="n-${l.id}"></div>`;
    g.appendChild(d);
    ms.forEach(m=>{
      const n=document.createElement('div');
      n.className='node'+(selId===m.id?' sel':'');
      n.style.borderColor=selId===m.id?COLS[m.layer]:'';
      n.innerHTML=`<div class="nn" style="color:${COLS[m.layer]}">${m.name}</div><div class="np">${m.purpose.split('.')[0]}.</div>`;
      n.onclick=()=>sel(m.id);
      d.querySelector('.nodes').appendChild(n);
    });
  });
}
function sel(id){
  selId=id;render();
  const m=MODS.find(x=>x.id===id);
  const calledBy=MODS.filter(x=>x.calls&&x.calls.includes(id)).map(x=>x.name);
  const d=document.getElementById('detail');
  const c=COLS[m.layer];
  d.style.display='block';
  d.innerHTML=`
    <h3 style="color:${c}">${m.name}</h3>
    <div class="dmeta">${m.layer.toUpperCase()} · ${m.lines} lines</div>
    <div class="dsec"><b>What it does</b><br><span style="color:#9b9a94">${m.purpose}</span></div>
    ${m.calls&&m.calls.length?`<div class="dsec"><b>Calls →</b><div class="dlist">${m.calls.map(c=>`<span class="dpill" onclick="sel('${c}')">${c}.py</span>`).join('')}</div></div>`:''}
    ${calledBy.length?`<div class="dsec"><b>← Called by</b><div class="dlist">${calledBy.map(c=>`<span class="dpill">${c}</span>`).join('')}</div></div>`:''}
    ${m.functions&&m.functions.length?`<div class="dsec"><b>Functions</b><div class="dlist">${m.functions.map(f=>`<span class="fntag" title="${f.doc||''}">${f.name}()</span>`).join('')}</div></div>`:''}
  `;
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function fl(l,btn){
  aL=l;selId=null;document.getElementById('detail').style.display='none';
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');render();
}
function filt(v){sT=v.toLowerCase().trim();render();}
render();
</script>
