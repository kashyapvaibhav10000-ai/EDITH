name: EDITH CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint:
    name: Syntax & Lint
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting deps
        run: pip install pyflakes

      - name: Syntax check — all Python files
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./.git/*") && echo "✓ Syntax OK"

      - name: Pyflakes — undefined names + unused imports
        run: |
          python -m pyflakes . 2>&1 | grep -v "^\./" || true

  smoke:
    name: Smoke Tests
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core deps (no GPU, no audio)
        run: |
          pip install fastapi uvicorn psutil python-dotenv requests \
                      chromadb networkx rapidfuzz faster-whisper \
                      pyflakes --quiet

      - name: Import check — core modules
        env:
          EDITH_CI: "1"
        run: |
          python -c "import config; print('config OK')"
          python -c "import errors; print('errors OK')"
          python -c "import validator; print('validator OK')"
          python -c "import event_bus; print('event_bus OK')"
          python -c "import smart_router; print('smart_router OK')"
