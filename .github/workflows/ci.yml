name: EDITH CI
on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting deps
        run: pip install pyflakes
      - name: Syntax check all Python files
        run: |
          python -c "
          import ast, glob, sys
          files = [f for f in glob.glob('**/*.py', recursive=True)
                   if 'edith-env' not in f and '.git' not in f]
          errors = []
          for f in files:
              try: ast.parse(open(f).read())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'Syntax OK — {len(files)} files checked')
          "
      - name: Pyflakes check
        run: python -m pyflakes . 2>&1 | grep -v "edith-env\|\.git" || true

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax-only smoke test
        run: |
          python -c "
          import ast, glob, sys
          files = [f for f in glob.glob('**/*.py', recursive=True)
                   if 'edith-env' not in f and '.git' not in f]
          errors = []
          for f in files:
              try: ast.parse(open(f).read())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All {len(files)} files syntax OK')
          "
